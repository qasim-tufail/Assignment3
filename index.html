<!DOCTYPE html>
<html lang="en" xmlns="http://www.w3.org/1999/xhtml">
<head>
    <meta charset="utf-8" />
    <title>Certo Figma</title>
     <link rel="stylesheet" href="assets/css/StyleSheet.css">
     <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
        <header>
            <nav>
                <div class="logo"><img src="assets/pics/logo.svg.png" alt=""></div>
                 <ul>
                    <li>
                        <a href="#">IPhone</a>
                        <a href="#">Android</a>
                        <a href="#">Help</a>
                        <a href="#">Company</a>
                    </li>
                </ul>
                <button class="btn-Sign">Sign in</button>
            </nav>
        </header>
        <main>
            <section class="sec1">
                <div class="sec1-left">
                    <h1>Your mobile privacy<br>is our mission</h1>
                    <p>
                    Think your phone has been hacked? Our trusted apps make it<br>
                    easy for you to scan, detect and remove threats from your<br>
                    iPhone and Android devices.
                    </p>
                    <div class="sec1-buttons">
                        <button class="btn-iphone">Get Certo for iPhone &nbsp;→</button>
                        <button class="btn-android">Get Certo for Android</button>
                    </div>
                </div>
                <div class="sec1-right">
                    <img class="person-img" src="/Pics/Blackman.svg.png">
                    <img class="phone-img" src="/Pics/mobile.svg.png">
                </div>
            </section>
            <section class="sec2">
                <h2 class="review-heading">
                Loved by thousands of iPhone <br>
                and Android users alike
                </h2>
                <div class="row">
                    <div class="col-md-4 mb-4">
                        <div class="card custom-card">
                            <div class="card-body">
                                <div class="stars">
                                    <img src="/Pics/star.svg.png">
                                    <img src="/Pics/star.svg.png">
                                    <img src="/Pics/star.svg.png">
                                    <img src="/Pics/star.svg.png">
                                    <img src="/Pics/star.svg.png">
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </section>
        </main>

        <footer>

        </footer>
</body>
</html>
